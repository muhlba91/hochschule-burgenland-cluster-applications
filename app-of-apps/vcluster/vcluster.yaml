---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vcluster
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"
  generators:
    - list:
        elements:
          - name: demo
          # - name: curie
          # - name: descartes
          # - name: lovelace
          # - name: newton
          # - name: meitner
          # - name: planck
          # - name: goodall
          # - name: darwin
  template:
    metadata:
      name: "cluster-group-{{ .name }}"
      namespace: argocd
    spec:
      project: default
      ignoreDifferences:
        - kind: Secret
          jsonPointers:
            - /data/CONFIG_READY
            - /data/config.yaml
      source:
        repoURL: https://github.com/muhlba91/hochschule-burgenland-cluster-applications
        path: charts/vcluster
        targetRevision: HEAD
        helm:
          releaseName: "cluster-{{ .name }}"
          valuesObject:
            gateway:
              enabled: true
              hostname: "{{ .name }}.cluster.classroom.hochschule-burgenland.muehlbachler.xyz"
              listenerset:
                certificateName: "vcluster-{{ .name }}-tls"
            vcluster:
              controlPlane:
                proxy:
                  extraSANs:
                    - "cluster-{{ .name }}.cluster-{{ .name }}"
                    - "{{ .name
                      }}.cluster.classroom.hochschule-burgenland.muehlbachler.x\
                      yz"
              exportKubeConfig:
                server: "https://{{ .name
                  }}.cluster.classroom.hochschule-burgenland.muehlbachler.xyz"
      destination:
        server: https://kubernetes.default.svc
        namespace: "cluster-{{ .name }}"
      syncPolicy:
        automated:
          prune: true
          allowEmpty: true
          selfHeal: true
        syncOptions:
          - RespectIgnoreDifferences=true
          - CreateNamespace=true
          - FailOnSharedResource=true
