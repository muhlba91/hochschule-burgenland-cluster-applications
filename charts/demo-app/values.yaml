---
group: group-X

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

# FIXME: remove once gateway support is added to vcluster
ingress:
  enabled: false
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: cluster-issuer-muehlbachler-xyz
    external-dns.alpha.kubernetes.io/provider: public
    external-dns.alpha.kubernetes.io/target: 178.63.69.250,2a01:4f8:121:14e2:100:3:3:1
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

gateway:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: cluster-issuer-muehlbachler-xyz
  hostname: chart-example.local
  listenerset:
    annotations:
      external-dns.alpha.kubernetes.io/provider: public
      external-dns.alpha.kubernetes.io/target: 178.63.69.250,2a01:4f8:121:14e2:100:3:3:1
    certificateName: chart-example-tls
    parentRef:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: kgateway-gateway
      namespace: kgateway

resources:
  limits:
    cpu: 50m
    memory: 16Mi
  requests:
    cpu: 5m
    memory: 8Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes:
  - name: html-files
    configMap:
      name: html-files

volumeMounts:
  - name: html-files
    mountPath: /usr/share/nginx/html/
    readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
