{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: {{ .Release.Name }}
  {{- with .Values.gateway.listenerset.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.gateway.listenerset.parentRef }}
  parentRef:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  listeners:
    - name: https-{{ .Release.Name }}
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.hostname }}
      {{- if .Values.gateway.listenerset.certificateName }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.gateway.listenerset.certificateName }}
      {{- end }}
{{- end }}
