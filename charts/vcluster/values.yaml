---
vcluster:
  sync:
    toHost:
      configMaps:
        all: true
      secrets:
        all: true
      ingresses:
        enabled: true
      storageClasses:
        enabled: true
      persistentVolumes:
        enabled: true
    fromHost:
      ingressClasses:
        enabled: true

  controlPlane:
    distro:
      k8s:
        enabled: true

    coredns:
      deployment:
        resources:
          requests:
            memory: 64Mi
            cpu: 5m
          limits:
            memory: 64Mi
            cpu: "1"

    service:
      annotations:
        traefik.ingress.kubernetes.io/service.serversscheme: https

    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: cluster-issuer-muehlbachler-xyz
        external-dns.alpha.kubernetes.io/provider: public
        external-dns.alpha.kubernetes.io/target: 178.63.69.250,2a01:4f8:121:14e2:100:3:3:1
        traefik.ingress.kubernetes.io/router.tls: "true"

    statefulSet:
      resources:
        requests:
          memory: 384Mi
          cpu: 75m
          ephemeral-storage: 1Gi
        limits:
          memory: 512Mi
          cpu: "1"
          ephemeral-storage: 2Gi
      persistence:
        volumeClaim:
          enabled: auto
          size: 5Gi
          storageClass: zfs

  deploy:
    kubeProxy:
      enabled: true

  integrations:
    metricsServer:
      enabled: true
      nodes: true
      pods: true

  policies:
    resourceQuota:
      enabled: false
    limitRange:
      enabled: false
    networkPolicy:
      enabled: false

  telemetry:
    enabled: false
